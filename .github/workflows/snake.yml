name: Generate Snake

# Builds the contribution-snake SVG from Georgi's contribution graph and
# commits it to the `output` branch. The profile README points at that file,
# so it is self-hosted (no external service to go down).

on:
  schedule:
    - cron: "0 */12 * * *" # twice a day
  workflow_dispatch: # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate the snake (Z-Innova red palette)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#55ead4&color_dots=#0d0d0d,#3a3a12,#7a7418,#c2bd1e,#f3e600

      - name: Push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
