name: Metrics

# Renders a rich, self-hosted stats SVG (github-metrics.svg) committed to the
# repo, so the README never depends on a third-party service being up.
# Uses the dark "terminal" template to match the neural banner.
#
# SETUP (one-time, by Georgi):
#   1. Create a classic PAT: GitHub › Settings › Developer settings ›
#      Personal access tokens › Tokens (classic) › Generate new token.
#      Scopes: read:user  (add repo to include private-repo stats).
#   2. Add it as a repo secret named METRICS_TOKEN:
#      repo › Settings › Secrets and variables › Actions › New repository secret.
#   3. Actions › Metrics › Run workflow.

on:
  schedule:
    - cron: "15 1 * * *" # daily
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics (terminal / dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GeorgiF0x
          filename: github-metrics.svg
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Madrid
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_lines: yes
