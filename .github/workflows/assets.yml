name: Profile assets

# Builds BOTH self-hosted profile visuals in one job (so they never race on
# the `output` branch): the contribution snake and the CP2077 code-distribution
# chart. Committed to the `output` branch; the README points at them. No
# third-party rendering service is involved, so nothing can go down.

on:
  schedule:
    - cron: "0 */12 * * *" # twice a day
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout (for the chart generator)
        uses: actions/checkout@v4

      - name: Contribution snake (CP2077 palette)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#55ead4&color_dots=#0d0d0d,#3a3a12,#7a7418,#c2bd1e,#f3e600

      - name: Code-distribution chart (CP2077)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: python3 .github/scripts/generate_chart.py dist/github-chart.svg

      - name: Publish both to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
