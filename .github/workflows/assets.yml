name: Profile assets

# Generates the self-hosted CP2077 code-distribution chart and commits it to
# the `output` branch, which the README points at. No third-party rendering
# service is involved, so nothing can go down.

on:
  schedule:
    - cron: "0 */12 * * *" # twice a day
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (for the chart generator)
        uses: actions/checkout@v4

      - name: Code-distribution chart (CP2077)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          mkdir -p dist
          python3 .github/scripts/generate_chart.py dist/github-chart.svg

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
